<div class="app-shell">

  <!-- Header -->
  <header class="app-header">
    <div class="app-header__inner">
      <div class="app-header__brand">
        <app-icon key="paragraph" [style.color]="service.COLORS.primary" className="w-7 h-7"></app-icon>
        <h1 class="app-header__title">Template Builder</h1>
      </div>

      <div class="app-header__actions">
        <!-- Field Designer Button -->
        <button
          *ngIf="service.preferences().showFieldDesigner"
          (click)="service.showFieldDesigner.set(true)"
          class="btn-header btn-header--primary"
          [style.backgroundColor]="service.COLORS.primary"
        >
          <app-icon key="library" className="w-4 h-4"></app-icon>
          Field Designer
        </button>

        <!-- Preview Toggle -->
        <button
          *ngIf="!service.showPreview()"
          (click)="service.showPreview.set(true); service.previewInitialTab.set('preview')"
          class="btn-header btn-header--secondary"
        >
          <app-icon key="eye" className="w-4 h-4"></app-icon>
          Preview
        </button>

        <!-- Export Toggle -->
        <button
          (click)="service.showPreview.set(true); service.previewInitialTab.set('json')"
          class="btn-header btn-header--secondary"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 18 22 12 16 6"></polyline>
            <polyline points="8 6 2 12 8 18"></polyline>
          </svg>
          Export
        </button>

        <!-- User Menu -->
        <div class="relative user-menu-container">
          <button
            (click)="service.showUserMenu.set(!service.showUserMenu())"
            class="user-menu-trigger"
            title="User Menu"
          >
            <div class="user-menu-avatar" [style.backgroundColor]="service.COLORS.primary">
              <app-icon key="star" className="w-4 h-4"></app-icon>
            </div>
          </button>

          <!-- Dropdown -->
          <div *ngIf="service.showUserMenu()" class="user-menu-dropdown">
            <button
              (click)="service.showPreferencesModal.set(true); service.showUserMenu.set(false)"
              class="user-menu-item"
            >
              <app-icon key="settings" className="w-4 h-4"></app-icon>
              <span class="font-medium">Preferences</span>
            </button>
            <button
              (click)="service.showPresetDefinitionsModal.set(true); service.showUserMenu.set(false)"
              class="user-menu-item"
            >
              <app-icon key="library" className="w-4 h-4"></app-icon>
              <span class="font-medium">Define Presets</span>
            </button>
            <button
              (click)="service.showApiKeyModal.set(true); service.showUserMenu.set(false)"
              class="user-menu-item"
            >
              <app-icon key="settings" className="w-4 h-4"></app-icon>
              <span class="font-medium">BioPortal API Key</span>
              <app-icon *ngIf="service.bioportalApiKey()" key="star" className="w-3.5 h-3.5 ml-auto text-green-600"></app-icon>
            </button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content Area -->
  <div class="main-content">

    <!-- Field Library Sidebar -->
    <app-field-library-sidebar *ngIf="service.preferences().fieldSelectionStyle === 'sidebar'"></app-field-library-sidebar>

    <!-- Editor Side -->
    <div [ngClass]="getEditorClasses()">
      <div class="editor-grid" [style.gridTemplateColumns]="getGridTemplateColumns()">

        <!-- Fields Overview Panel -->
        <div *ngIf="service.fields().length > 0 && showFieldsOverview()" class="overview-panel">
          <div class="overview-panel__card">
            <div class="overview-panel__header">
              <div class="overview-panel__header-left">
                <app-icon key="list" className="w-4 h-4 text-gray-600"></app-icon>
                <h3 class="overview-panel__title">Overview ({{ service.fields().length }})</h3>
              </div>
              <button class="overview-panel__close" (click)="showFieldsOverview.set(false)">
                <span class="text-xs">×</span>
              </button>
            </div>

            <div class="overview-panel__list">
              <button
                *ngFor="let field of service.fields()"
                (click)="scrollToField(field.id)"
                class="overview-panel__item"
                [class.active]="service.selectedField() === field.id"
              >
                <span class="overview-panel__item-icon">
                  <app-icon [key]="getFieldIcon(field)" className="w-4 h-4"></app-icon>
                </span>
                <span class="overview-panel__item-name">{{ field.name }}</span>
                <span *ngIf="field.status === 'required'" class="overview-panel__badge-required">Req</span>
              </button>
            </div>
          </div>
        </div>

        <!-- Editor Workspace -->
        <div class="editor-workspace">

          <!-- Overview Toggle -->
          <button
            *ngIf="service.fields().length > 0 && !showFieldsOverview()"
            (click)="showFieldsOverview.set(true)"
            class="btn-overview-toggle"
            [style.left]="getOverviewButtonLeft()"
          >
            <app-icon key="list" className="w-4 h-4 text-gray-700"></app-icon>
            <span class="text-xs font-semibold text-gray-700">Show Overview ({{ service.fields().length }})</span>
          </button>

          <!-- Template Header Card -->
          <div class="template-header-card">
            <div
              class="template-header-card__gradient"
              [style.background]="'linear-gradient(90deg, ' + service.COLORS.primary + ' 0%, ' + service.COLORS.primaryLight + ' 100%)'"
            ></div>
            <div class="template-header-card__body">
              <div class="template-header-card__icon" [style.backgroundColor]="service.COLORS.primaryLight">
                <app-icon key="paragraph" className="w-6 h-6" [style.color]="service.COLORS.primary"></app-icon>
              </div>
              <div class="template-header-card__inputs">
                <input
                  type="text"
                  [ngModel]="service.templateName()"
                  (ngModelChange)="service.templateName.set($event)"
                  class="template-title-input"
                  placeholder="Template title"
                />
                <input
                  type="text"
                  [ngModel]="service.templateDesc()"
                  (ngModelChange)="service.templateDesc.set($event)"
                  class="template-desc-input"
                  placeholder="Add description..."
                />
              </div>
            </div>
          </div>

          <!-- Fields Drop List -->
          <div cdkDropList (cdkDropListDropped)="onFieldDrop($event)" class="fields-drop-list">
            <div
              *ngFor="let field of service.fields(); let idx = index"
              class="field-drop-item"
              [id]="'field-card-' + field.id"
            >
              <!-- Insert Zone (modal style) -->
              <ng-container *ngIf="service.preferences().fieldSelectionStyle === 'modal'">
                <div class="insert-zone" (click)="service.showPicker.set(idx)">
                  <button class="btn-insert-here" [style.backgroundColor]="service.COLORS.primary">
                    ＋ Add field here
                  </button>
                </div>
                <div *ngIf="service.showPicker() === idx" class="my-3">
                  <app-field-type-picker [insertPosition]="idx"></app-field-type-picker>
                </div>
              </ng-container>

              <!-- Drag Container -->
              <div
                cdkDrag
                (click)="service.selectedField.set(field.id)"
                class="field-drag-container"
                [class.selected]="service.selectedField() === field.id"
              >
                <div *ngIf="service.selectedField() === field.id" class="field-selection-bar"></div>
                <app-field-card [field]="field"></app-field-card>
              </div>
            </div>
          </div>

          <!-- Bottom Add Field Section (modal style) -->
          <div *ngIf="service.preferences().fieldSelectionStyle === 'modal'" class="add-field-section">
            <button
              (click)="service.showPicker.set(service.fields().length)"
              class="btn-add-field"
              [style.backgroundColor]="service.COLORS.primary"
            >
              <span class="text-base font-bold">＋</span>
              Add Field
            </button>
            <div *ngIf="service.showPicker() === service.fields().length" class="add-field-section__picker">
              <app-field-type-picker [insertPosition]="service.fields().length"></app-field-type-picker>
            </div>
          </div>

        </div>
      </div>
    </div>

    <!-- Preview / Export Panel -->
    <app-preview-panel *ngIf="service.showPreview()" class="w-[35%] bg-white border-l border-gray-300"></app-preview-panel>
  </div>

  <!-- Floating Save Button -->
  <div class="floating-save">
    <div class="floating-save__wrapper">
      <button
        (click)="saveTemplate()"
        class="btn-save"
        [style.backgroundColor]="service.COLORS.primary"
      >
        <span class="text-xl">💾</span>
      </button>
      <div class="floating-save__tooltip">Save Template</div>
    </div>
  </div>

  <!-- Modals -->
  <app-preferences-modal></app-preferences-modal>
  <app-preset-definitions-modal></app-preset-definitions-modal>
  <app-api-key-modal></app-api-key-modal>
</div>

<!-- Field Designer Overlay -->
<app-field-designer *ngIf="service.showFieldDesigner()" class="fixed inset-0 z-50"></app-field-designer>
