<div class="min-h-screen bg-gray-100 relative flex flex-col font-sans">
  
  <!-- Header -->
  <header class="bg-white border-b border-gray-300 sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <app-icon key="paragraph" [style.color]="service.COLORS.primary" className="w-7 h-7"></app-icon>
        <h1 class="text-lg font-medium text-gray-900">Template Builder</h1>
      </div>
      <div class="flex items-center gap-4">
        <!-- Field Designer Button - Show based on preferences -->
        <button
          *ngIf="service.preferences().showFieldDesigner"
          (click)="service.showFieldDesigner.set(true)"
          class="flex items-center gap-2 px-3 py-1.5 rounded-lg border transition-all text-white border-transparent cursor-pointer"
          [style.backgroundColor]="service.COLORS.primary"
        >
          <app-icon key="library" className="w-4 h-4"></app-icon>
          <span class="text-sm font-medium">Field Designer</span>
        </button>

        <!-- Preview Toggle -->
        <button
          *ngIf="!service.showPreview()"
          (click)="service.showPreview.set(true); service.previewInitialTab.set('preview')"
          class="flex items-center gap-2 px-3 py-1.5 rounded-lg border transition-all bg-white text-gray-700 border-gray-300 hover:border-gray-400 cursor-pointer"
        >
          <app-icon key="eye" className="w-4 h-4"></app-icon>
          <span class="text-sm font-medium">Preview</span>
        </button>

        <!-- Export Toggle -->
        <button
          (click)="service.showPreview.set(true); service.previewInitialTab.set('json')"
          class="flex items-center gap-2 px-3 py-1.5 rounded-lg border transition-all bg-white text-gray-700 border-gray-300 hover:border-gray-400 cursor-pointer"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 18 22 12 16 6"></polyline>
            <polyline points="8 6 2 12 8 18"></polyline>
          </svg>
          <span class="text-sm font-medium">Export</span>
        </button>
        
        <!-- User Menu -->
        <div class="relative user-menu-container">
          <button
            (click)="service.showUserMenu.set(!service.showUserMenu())"
            class="flex items-center gap-2 hover:opacity-80 transition-opacity cursor-pointer text-left"
            title="User Menu"
          >
            <div 
              class="w-8 h-8 rounded-full flex items-center justify-center cursor-pointer text-white" 
              [style.backgroundColor]="service.COLORS.primary"
            >
              <app-icon key="star" className="w-4 h-4"></app-icon>
            </div>
          </button>

          <!-- Dropdown Menu -->
          <div *ngIf="service.showUserMenu()" class="absolute right-0 mt-2 w-56 bg-white rounded-lg border border-gray-300 shadow-lg z-50 overflow-hidden animate-fade-in">
            <button
              (click)="service.showPreferencesModal.set(true); service.showUserMenu.set(false)"
              class="w-full px-4 py-3 text-left text-sm text-gray-700 hover:bg-gray-50 transition-colors flex items-center gap-3 cursor-pointer border-none bg-transparent"
            >
              <app-icon key="settings" className="w-4 h-4"></app-icon>
              <span class="font-medium">Preferences</span>
            </button>
            <button
              (click)="service.showPresetDefinitionsModal.set(true); service.showUserMenu.set(false)"
              class="w-full px-4 py-3 text-left text-sm text-gray-700 hover:bg-gray-50 transition-colors flex items-center gap-3 border-t border-gray-200 cursor-pointer bg-transparent"
            >
              <app-icon key="library" className="w-4 h-4"></app-icon>
              <span class="font-medium">Define Presets</span>
            </button>
            <button
              (click)="service.showApiKeyModal.set(true); service.showUserMenu.set(false)"
              class="w-full px-4 py-3 text-left text-sm text-gray-700 hover:bg-gray-50 transition-colors flex items-center gap-3 border-t border-gray-200 cursor-pointer bg-transparent"
            >
              <app-icon key="settings" className="w-4 h-4"></app-icon>
              <span class="font-medium">BioPortal API Key</span>
              <app-icon *ngIf="service.bioportalApiKey()" key="star" className="w-3.5 h-3.5 ml-auto text-green-600"></app-icon>
            </button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content Area - Split View -->
  <div class="flex-1 flex overflow-hidden">
    
    <!-- Field Library Sidebar - Left -->
    <app-field-library-sidebar *ngIf="service.preferences().fieldSelectionStyle === 'sidebar'"></app-field-library-sidebar>
    
    <!-- Editor Side -->
    <div [ngClass]="getEditorClasses()">
      
      <!-- Editor Sidebar/Grid layout spacer -->
      <div 
        class="grid h-full"
        [style.gridTemplateColumns]="getGridTemplateColumns()"
      >
        <!-- Fields Overview Sidebar Column - Left of Editor -->
        <div *ngIf="service.fields().length > 0 && showFieldsOverview()" class="p-4 hidden md:block">
          <div 
            class="bg-white rounded-lg border border-gray-300 shadow-md flex flex-col sticky"
            style="top: 24px; width: 100%; max-height: calc(100vh - 150px); overflow-y: auto;"
          >
            <div class="px-4 py-3 border-b border-gray-200 flex items-center justify-between sticky top-0 bg-white z-10">
              <div class="flex items-center gap-2">
                <app-icon key="list" className="w-4 h-4 text-gray-600"></app-icon>
                <h3 class="text-sm font-medium text-gray-900">Overview ({{ service.fields().length }})</h3>
              </div>
              <button 
                (click)="showFieldsOverview.set(false)"
                class="text-gray-400 hover:text-gray-600 cursor-pointer"
              >
                <span class="text-xs">×</span>
              </button>
            </div>
            
            <div class="divide-y divide-gray-100">
              <button
                *ngFor="let field of service.fields(); let idx = index"
                (click)="scrollToField(field.id)"
                class="w-full flex items-center gap-2 px-3 py-2.5 hover:bg-gray-50 transition-colors text-left cursor-pointer border-none bg-transparent"
                [class.bg-emerald-50]="service.selectedField() === field.id"
              >
                <span class="text-gray-500 flex-shrink-0">
                  <app-icon [key]="getFieldIcon(field)" className="w-4 h-4"></app-icon>
                </span>
                <span class="text-xs font-medium text-gray-700 truncate flex-1">{{ field.name }}</span>
                <span 
                  *ngIf="field.status === 'required'" 
                  class="text-[9px] px-1 bg-red-100 text-red-800 rounded font-semibold"
                >Req</span>
              </button>
            </div>
          </div>
        </div>

        <!-- Editor Workspace Column -->
        <div class="relative py-8 px-6 max-w-4xl mx-auto w-full">
          <!-- Overview Toggle Button -->
          <button
            *ngIf="service.fields().length > 0 && !showFieldsOverview()"
            (click)="showFieldsOverview.set(true)"
            class="fixed left-6 top-24 px-3 py-2 bg-white rounded-lg border border-gray-300 shadow-md hover:shadow-lg transition-all z-20 flex items-center gap-2 cursor-pointer"
            [style.left]="getOverviewButtonLeft()"
          >
            <app-icon key="list" className="w-4 h-4 text-gray-700"></app-icon>
            <span class="text-xs font-semibold text-gray-700">Show Overview ({{ service.fields().length }})</span>
          </button>

          <!-- Template Header Card -->
          <div class="bg-white rounded-lg border border-gray-300 mb-4 overflow-hidden shadow-sm relative">
            <!-- Decorative top gradient border -->
            <div 
              class="absolute top-0 left-0 right-0 h-1.5"
              [style.background]="'linear-gradient(90deg, ' + service.COLORS.primary + ' 0%, ' + service.COLORS.primaryLight + ' 100%)'"
            ></div>
            
            <div class="p-6 flex items-start gap-4">
              <!-- Header Icon -->
              <div 
                class="flex-shrink-0 w-12 h-12 rounded-lg flex items-center justify-center mt-1"
                [style.backgroundColor]="service.COLORS.primaryLight"
              >
                <app-icon key="paragraph" className="w-6 h-6" [style.color]="service.COLORS.primary"></app-icon>
              </div>
              
              <!-- Title and Description Inputs -->
              <div class="flex-1">
                <input 
                  type="text" 
                  [ngModel]="service.templateName()"
                  (ngModelChange)="service.templateName.set($event)"
                  class="text-lg font-medium text-gray-900 border-none outline-none w-full bg-transparent mb-1 pb-1 border-b-2 border-transparent focus:border-teal-600 transition-colors"
                  placeholder="Template title"
                />
                <input 
                  type="text" 
                  [ngModel]="service.templateDesc()"
                  (ngModelChange)="service.templateDesc.set($event)"
                  class="text-sm text-gray-600 border-none outline-none w-full bg-transparent"
                  placeholder="Add description..."
                />
              </div>
            </div>
          </div>

          <!-- Drag and Drop Fields List -->
          <div 
            cdkDropList
            (cdkDropListDropped)="onFieldDrop($event)"
            class="space-y-3"
          >
            <div 
              *ngFor="let field of service.fields(); let idx = index"
              class="relative"
              [id]="'field-card-' + field.id"
            >
              
              <!-- Insert Zone Before Field (For Popup selection style) -->
              <ng-container *ngIf="service.preferences().fieldSelectionStyle === 'modal'">
                <div 
                  class="insert-zone flex justify-center items-center absolute w-full opacity-0 hover:opacity-100 transition-opacity z-10 cursor-pointer"
                  (click)="service.showPicker.set(idx)"
                  style="height: 30px; top: -17px;"
                >
                  <button 
                    class="text-[10px] text-white rounded-full px-3 py-1 shadow-md font-medium border-none cursor-pointer"
                    [style.backgroundColor]="service.COLORS.primary"
                  >
                    ＋ Add field here
                  </button>
                </div>

                <!-- Field Type Picker Inline Dialog -->
                <div *ngIf="service.showPicker() === idx" class="my-3">
                  <app-field-type-picker [insertPosition]="idx"></app-field-type-picker>
                </div>
              </ng-container>

              <!-- Drag Container -->
              <div 
                cdkDrag
                (click)="service.selectedField.set(field.id)"
                class="bg-white rounded-lg border border-gray-300 shadow-sm relative group hover:border-gray-400 transition-colors"
                [class.ring-2]="service.selectedField() === field.id"
                [style.ringColor]="service.COLORS.primary"
              >
                <!-- Selection indicator bar -->
                <div 
                  *ngIf="service.selectedField() === field.id"
                  class="absolute -left-0.5 top-2 bottom-2 w-1 rounded bg-teal-600"
                ></div>

                <!-- Decomposed Field Card component -->
                <app-field-card [field]="field"></app-field-card>
              </div>
            </div>
          </div>

          <!-- Bottom Add Field Button (For Popup selection style) -->
          <div *ngIf="service.preferences().fieldSelectionStyle === 'modal'" class="mt-6 flex flex-col items-center">
            <button 
              (click)="service.showPicker.set(service.fields().length)"
              class="text-white rounded-full p-3 shadow-md hover:scale-105 transition-all flex items-center gap-3 px-6 cursor-pointer border-none"
              [style.backgroundColor]="service.COLORS.primary"
            >
              <span class="text-base font-bold">＋</span>
              <span class="text-sm font-medium">Add Field</span>
            </button>

            <!-- Bottom Picker Panel -->
            <div *ngIf="service.showPicker() === service.fields().length" class="w-full mt-4">
              <app-field-type-picker [insertPosition]="service.fields().length"></app-field-type-picker>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Preview Side Panel - Right -->
    <app-preview-panel *ngIf="service.showPreview()" class="w-[35%] bg-white border-l border-gray-300"></app-preview-panel>
  </div>

  <!-- Floating Save Button -->
  <div class="fixed bottom-6 right-6 z-30">
    <div class="relative group">
      <button 
        (click)="saveTemplate()"
        class="w-12 h-12 rounded-full flex items-center justify-center text-white transition-all shadow-lg hover:shadow-xl hover:scale-105 cursor-pointer border-none"
        [style.backgroundColor]="service.COLORS.primary"
      >
        <!-- Save icon -->
        <span class="text-xl">💾</span>
      </button>
      <div class="absolute bottom-full right-0 mb-2 px-3 py-2 bg-gray-900 text-white text-xs rounded shadow-lg opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity whitespace-nowrap">
        Save Template
      </div>
    </div>
  </div>

  <!-- Modals -->
  <app-preferences-modal></app-preferences-modal>
  <app-preset-definitions-modal></app-preset-definitions-modal>
  <app-api-key-modal></app-api-key-modal>
</div>

<!-- Field Designer Screen Overlay -->
<app-field-designer *ngIf="service.showFieldDesigner()" class="fixed inset-0 z-50"></app-field-designer>
