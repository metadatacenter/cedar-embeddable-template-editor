<div 
  class="border-r border-gray-200 bg-white flex flex-col transition-all duration-300 fixed left-0 z-30"
  [style.width]="service.sidebarCollapsed() ? '48px' : '288px'"
  style="top: 57px; height: calc(100vh - 57px); max-height: calc(100vh - 57px);"
>
  <ng-container *ngIf="!service.sidebarCollapsed(); else collapsedView">
    <!-- Field List Section -->
    <div 
      class="flex flex-col border-b border-gray-300"
      [style.height.%]="fieldListHeight"
    >
      <!-- Field List Header -->
      <div class="px-4 py-3 border-b border-gray-200 flex items-center justify-between bg-gray-50">
        <div class="flex items-center gap-2">
          <app-icon key="list" className="w-4 h-4 text-gray-600"></app-icon>
          <h3 class="text-sm font-medium text-gray-900">Fields ({{ service.fields().length }})</h3>
        </div>
        <button
          (click)="service.sidebarCollapsed.set(true)"
          class="text-gray-400 hover:text-gray-600 transition-colors cursor-pointer"
          title="Collapse sidebar"
        >
          <span class="text-xs">◀</span>
        </button>
      </div>

      <!-- Field List - Drag & Drop Scrollable -->
      <div 
        class="flex-1 overflow-y-auto custom-scrollbar"
        cdkDropList
        (cdkDropListDropped)="onFieldDrop($event)"
      >
        <div *ngIf="service.fields().length === 0" class="p-4 text-center text-sm text-gray-500">
          No fields yet
        </div>
        <div 
          *ngFor="let field of service.fields(); let idx = index"
          cdkDrag
          (click)="service.selectedField.set(field.id)"
          class="w-full flex items-center gap-2 px-3 py-2 hover:bg-gray-50 transition-colors border-l-3 group cursor-pointer"
          [class.bg-gray-100]="service.selectedField() === field.id"
          [style.borderLeftColor]="service.selectedField() === field.id ? service.COLORS.primary : 'transparent'"
          style="border-left-width: 3px; border-left-style: solid;"
        >
          <span class="text-gray-600 flex-shrink-0">
            <app-icon [key]="getFieldIconKey(field)" className="w-5 h-5"></app-icon>
          </span>
          <div class="flex-1 text-left min-w-0">
            <div class="text-sm text-gray-900 truncate">{{ field.name }}</div>
          </div>
          <div 
            class="w-2 h-2 rounded-full flex-shrink-0"
            [style.backgroundColor]="service.selectedField() === field.id ? service.COLORS.primary : '#94A3B8'"
          ></div>
          <div class="flex-shrink-0 text-gray-300 group-hover:text-gray-500 transition-colors cursor-grab" cdkDragHandle>
            <app-icon key="list" className="w-3 h-3"></app-icon>
          </div>
        </div>
      </div>
    </div>

    <!-- Draggable Divider -->
    <div
      (mousedown)="onResizeStart($event)"
      class="h-2 bg-gray-100 hover:bg-gray-200 cursor-ns-resize flex items-center justify-center border-y border-gray-200 transition-colors"
      [style.backgroundColor]="isResizing() ? '#d1d5db' : ''"
      style="user-select: none;"
    >
      <div class="w-8 h-1 bg-gray-300 rounded"></div>
    </div>

    <!-- Add Fields Section -->
    <div 
      class="flex flex-col"
      [style.height.%]="100 - fieldListHeight"
    >
      <!-- Add Fields Header -->
      <div class="px-4 py-3 border-b border-gray-200 bg-gray-50">
        <h3 class="text-sm font-semibold text-gray-700 uppercase tracking-wide">
          Libraries & Fields
        </h3>
      </div>

      <!-- Scrollable Content -->
      <div class="flex-1 overflow-y-auto custom-scrollbar">
        <!-- Built-in Field Types -->
        <div class="border-b border-gray-200">
          <button
            (click)="expandedBuiltIn.set(!expandedBuiltIn())"
            class="w-full flex items-center justify-between p-3 hover:bg-gray-50 transition-colors text-left cursor-pointer"
          >
            <span class="text-sm font-medium text-gray-900">Built-in Fields</span>
            <span class="text-xs text-gray-500 transition-transform" [class.rotate-90]="!expandedBuiltIn()">▼</span>
          </button>
          
          <div *ngIf="expandedBuiltIn()" class="pb-2 animate-fade-in">
            <button
              *ngFor="let item of visibleFieldTypesList()"
              (click)="service.addField(item.key, service.fields().length)"
              class="w-full flex items-center gap-2 px-4 py-2 hover:bg-gray-50 transition-colors group text-left cursor-pointer border-l-3 border-transparent"
            >
              <span class="text-gray-600">
                <app-icon [key]="item.key" className="w-5 h-5"></app-icon>
              </span>
              <span class="text-sm text-gray-900 flex-1">{{ item.value.label }}</span>
              <span class="text-sm text-gray-400 opacity-0 group-hover:opacity-100 transition-opacity font-bold">＋</span>
            </button>
          </div>
        </div>

        <!-- Library Fields -->
        <div *ngFor="let library of service.libraries()" class="border-b border-gray-200">
          <button
            (click)="toggleLibrary(library.id)"
            class="w-full flex items-center justify-between p-3 hover:bg-gray-50 transition-colors text-left cursor-pointer"
          >
            <span class="text-sm font-medium text-gray-900">{{ library.name }}</span>
            <span class="text-xs text-gray-500 transition-transform" [class.rotate-90]="!expandedLibraries().has(library.id)">▼</span>
          </button>
          
          <div *ngIf="expandedLibraries().has(library.id)" class="pb-2 animate-fade-in">
            <div *ngIf="getFieldsForLibrary(library.id).length === 0" class="px-4 py-2 text-xs text-gray-500 italic">
              No fields in this library
            </div>
            <button
              *ngFor="let field of getFieldsForLibrary(library.id)"
              (click)="service.addCustomFieldToTemplate(field, service.fields().length)"
              class="w-full flex items-center gap-2 px-4 py-2 hover:bg-gray-50 transition-colors group text-left cursor-pointer border-l-3 border-transparent"
            >
              <span class="text-gray-600">
                <app-icon [key]="field.baseType" className="w-5 h-5"></app-icon>
              </span>
              <div class="flex-1 text-left min-w-0">
                <div class="text-sm text-gray-900">{{ field.name }}</div>
                <div *ngIf="field.description" class="text-xs text-gray-500 truncate">{{ field.description }}</div>
              </div>
              <span class="text-sm text-gray-400 opacity-0 group-hover:opacity-100 transition-opacity font-bold flex-shrink-0">＋</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </ng-container>

  <!-- Collapsed View -->
  <ng-template #collapsedView>
    <div class="flex flex-col h-full">
      <!-- Expand Button -->
      <div class="p-3 border-b border-gray-200 flex justify-center">
        <button
          (click)="service.sidebarCollapsed.set(false)"
          class="text-gray-400 hover:text-gray-600 transition-colors cursor-pointer"
          title="Expand sidebar"
        >
          <span class="text-xs">▶</span>
        </button>
      </div>

      <!-- Collapsed Icons -->
      <div class="flex-1 overflow-y-auto custom-scrollbar py-2">
        <!-- Field count indicator -->
        <div class="flex justify-center py-2 border-b border-gray-200">
          <div class="relative">
            <app-icon key="list" className="w-5 h-5 text-gray-600"></app-icon>
            <div 
              *ngIf="service.fields().length > 0" 
              class="absolute -top-1 -right-1 w-3 h-3 rounded-full text-xs flex items-center justify-center font-bold"
              [style.backgroundColor]="service.COLORS.primary"
              style="font-size: 8px; color: white;"
            >
              {{ service.fields().length }}
            </div>
          </div>
        </div>

        <!-- Built-in indicator -->
        <div class="flex justify-center py-2 border-b border-gray-200">
          <span class="text-lg font-bold text-gray-500">＋</span>
        </div>
        
        <!-- Library indicators -->
        <div 
          *ngFor="let library of service.libraries(); let last = last" 
          class="flex justify-center py-2"
          [class.border-b]="!last"
          [class.border-gray-200]="!last"
        >
          <app-icon key="library" className="w-5 h-5 text-gray-600"></app-icon>
        </div>
      </div>
    </div>
  </ng-template>
</div>
